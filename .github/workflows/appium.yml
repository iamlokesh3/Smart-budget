name: Mobile Appium Automation

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  appium-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install Root Dependencies
        run: npm install

      - name: Run Appium Tests
        run: npm run test:appium || true

      - name: Generate Excel Report
        run: node utils/excelReportGenerator.js

      - name: Upload Appium Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: appium-execution-results
          path: |
            reports/appium-report.html
            reports/appium-report.json
            reports/Appium_Report.xlsx
            reports/Master_Report.xlsx
            screenshots/appium_logout_cache_failure.png
          retention-days: 7
